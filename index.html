<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="icon.png">

  <title>売上管理</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- ホイールUI（mobiscroll） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobiscroll@5/dist/css/mobiscroll.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mobiscroll@5/dist/js/mobiscroll.min.js"></script>
</head>

<body>

<h2>🌸売上入力🌸</h2>

<div class="card">

<label>日付</label>
<input　id="date">

<label>メイド名</label>
<input type="text" id="maids">

<label>📸 拍立得</label>
<input id="cheki">

<label>📱 手機拍</label>
<input id="phone">

<label>🌐 線上拍</label>
<input id="online">

<label>🎬 影片</label>
<input id="video">

<label>🎤 表演</label>
<input id="performance">

<button class="save-btn" onclick="saveData()">保存</button>
<button class="chart-btn" onclick="goChart()">分析</button>

</div>

<h2>記録一覧</h2>
<ul id="list"></ul>

<script src="script.js"></script>

<script>
/* 🌸 ホイールピッカー設定 */
mobiscroll.number('#cheki', { min: 0, max: 50, step: 1, wheel: true });
mobiscroll.number('#phone', { min: 0, max: 50, step: 1, wheel: true });
mobiscroll.number('#online', { min: 0, max: 50, step: 1, wheel: true });
mobiscroll.number('#video', { min: 0, max: 50, step: 1, wheel: true });
mobiscroll.number('#performance', { min: 0, max: 50, step: 1, wheel: true });
</script>

</body>
</html>
