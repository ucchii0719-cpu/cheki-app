<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>売上管理</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h2>売上入力</h2>

    <label>日付</label>
    <input type="date" id="date">

    <label>同事</label>
    <input type="text" id="maids">

    <label>拍立得：<span id="chekiValue">0</span></label>
    <input type="range" id="cheki" min="0" max="20" value="0" oninput="updateValue('cheki')">

    <label>手機拍：<span id="phoneValue">0</span></label>
    <input type="range" id="phone" min="0" max="20" value="0" oninput="updateValue('phone')">
    
    <label>線上拍：<span id="onlineValue">0</span></label>
    <input type="range" id="online" min="0" max="20" value="0" oninput="updateValue('online')">
    
    <label>影片：<span id="videoValue">0</span></label>
    <input type="range" id="video" min="0" max="20" value="0" oninput="updateValue('video')">
    
    <label>表演：<span id="performanceValue">0</span></label>
    <input type="range" id="performance" min="0" max="20" value="0" oninput="updateValue('performance')">

    <button onclick="saveData()">保存</button>
    <button onclick="goChart()">分析を見る</button>

    <h2>記録一覧</h2>
    <ul id="list"></ul>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
